services:

  frontend:
    build: 
      context: ../frontend
      args:
        - VITE_API_URL=http://localhost:3000
    ports:
      - "80:80"

    depends_on:
      - backend


  backend:
    build: ../backend

    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: appdb

    depends_on:
      - mysql


  mysql:
    image: mysql:8

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ../bd/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ../bd/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql


volumes:
  mysql_data: