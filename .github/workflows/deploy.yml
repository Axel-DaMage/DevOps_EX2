name: Deploy to ECS Fargate

on:
  push:
    branches: [deploy]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Iniciar sesion en ECR
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Construir y publicar backend
        run: |
          docker build -t innovatech/backend:$IMAGE_TAG -t innovatech/backend:latest ./backend
          docker tag innovatech/backend:$IMAGE_TAG $ECR_REGISTRY/innovatech/backend:$IMAGE_TAG
          docker tag innovatech/backend:latest $ECR_REGISTRY/innovatech/backend:latest
          docker push $ECR_REGISTRY/innovatech/backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/innovatech/backend:latest

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Iniciar sesion en ECR
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Construir y publicar frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t innovatech/frontend:$IMAGE_TAG -t innovatech/frontend:latest \
            ./frontend
          docker tag innovatech/frontend:$IMAGE_TAG $ECR_REGISTRY/innovatech/frontend:$IMAGE_TAG
          docker tag innovatech/frontend:latest $ECR_REGISTRY/innovatech/frontend:latest
          docker push $ECR_REGISTRY/innovatech/frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/innovatech/frontend:latest

  deploy:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Forzar nuevo despliegue del frontend
        run: |
          aws ecs update-service --cluster innovatech-cluster --service frontend-service --force-new-deployment

      - name: Forzar nuevo despliegue del backend
        run: |
          aws ecs update-service --cluster innovatech-cluster --service backend-service --force-new-deployment

      - name: Esperar estabilidad del frontend
        run: |
          aws ecs wait services-stable --cluster innovatech-cluster --services frontend-service

      - name: Esperar estabilidad del backend
        run: |
          aws ecs wait services-stable --cluster innovatech-cluster --services backend-service

  summary:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "================================"
          echo "  DEPLOY COMPLETADO"
          echo "================================"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Frontend: ${{ secrets.ECR_REGISTRY }}/innovatech/frontend:${{ env.IMAGE_TAG }}"
          echo "Backend:  ${{ secrets.ECR_REGISTRY }}/innovatech/backend:${{ env.IMAGE_TAG }}"
          echo "ALB URL:  http://innovatech-alb-688188016.us-east-1.elb.amazonaws.com"
          echo "================================"